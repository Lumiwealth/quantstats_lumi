name: Release (PyPI + GitHub)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  validate-build:
    name: Validate + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate tag version matches package version
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          if not tag.startswith("v"):
              raise SystemExit(f"Expected tag like vX.Y.Z, got {tag!r}")
          expected = tag.removeprefix("v")

          version_py = Path("quantstats_lumi/version.py").read_text(encoding="utf-8")
          actual = None
          for line in version_py.splitlines():
              if line.strip().startswith("version"):
                  actual = line.split("=", 1)[1].strip().strip('"').strip("'")
                  break
          if actual != expected:
              raise SystemExit(f"Tag version {expected} != quantstats_lumi/version.py {actual}")
          print(f"OK: tag={tag} package_version={actual}")
          PY

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest build
          pip install -e .

      - name: Run tests
        run: |
          set -euo pipefail
          pytest -q

      - name: Build package
        run: |
          set -euo pipefail
          python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI + Create GitHub Release
    needs: validate-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
